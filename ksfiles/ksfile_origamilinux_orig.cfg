# Generated by Anaconda 43.44
# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'
# System language
lang en_US.UTF-8

# OSTree container setup
ostreecontainer --no-signature-verification --transport="oci" --url="/run/install/repo/origami-latest"

# System authorization information
authselect enable-feature with-fingerprint

# Run the Setup Agent on first boot
firstboot --enable

# Generated using Blivet version 3.12.1
ignoredisk --only-use=sda
# Partition clearing information
clearpart --none --initlabel
# Disk partitioning information
part /boot/efi --fstype="efi" --ondisk=sda --size=600 --fsoptions="umask=0077,shortname=winnt"
part /boot --fstype="ext4" --ondisk=sda --size=2048
part btrfs.69 --fstype="btrfs" --ondisk=sda --size=48550 --encrypted --luks-version=luks2
btrfs none --label=origami_fedora btrfs.69
btrfs / --subvol --name=root LABEL=origami_fedora
btrfs /var --subvol --name=var LABEL=origami_fedora
btrfs /home --subvol --name=home LABEL=origami_fedora

# System timezone
timezone Europe/Vienna --utc

#Root password
rootpw --lock
user --groups=wheel --name=hoo --password=$y$... --iscrypted --uid=1000 --gecos="hoo" --gid=1000

%post --erroronfail --nochroot

set -oue pipefail

readonly ENROLLMENT_PASSWORD=origami
readonly SECUREBOOT_KEY="/run/install/repo/sb_pubkey.der"

if [[ ! -d "/sys/firmware/efi" ]]; then
echo "EFI mode not detected. Skipping key enrollment."
exit 0
fi

if [[ ! -f "$SECUREBOOT_KEY" ]]; then
echo "Secure boot key not provided: $SECUREBOOT_KEY"
exit 0
fi

SYS_ID="$(cat /sys/devices/virtual/dmi/id/product_name)"
if [[ ":Jupiter:Galileo:" =~ ":$SYS_ID:" ]]; then
echo "Steam Deck hardware detected. Skipping key enrollment."
exit 0
fi

mokutil --timeout -1 || :
echo -e "$ENROLLMENT_PASSWORD
$ENROLLMENT_PASSWORD" | mokutil --import "$SECUREBOOT_KEY" || :

%end

%post --erroronfail

if (which bootc &> /dev/null) && [  == 'false' && 43 -ge 39 ]
then
if [ true == 'true' ]
then
bootc switch --mutate-in-place --enforce-container-sigpolicy --transport registry registry.gitlab.com/origami-linux/images/origami:latest
else
bootc switch --mutate-in-place --transport registry registry.gitlab.com/origami-linux/images/origami:latest
fi
else
if [ true == 'true' ]
then
sed -i 's/container-image-reference=.*/container-image-reference=ostree-image-signed:docker:\/\/registry.gitlab.com\/origami-linux\/images\/origami:latest/' /ostree/deploy/default/deploy/*.origin
else
sed -i 's/container-image-reference=.*/container-image-reference=ostree-unverified-image:docker:\/\/registry.gitlab.com\/origami-linux\/images\/origami:latest/' /ostree/deploy/default/deploy/*.origin
fi
fi

%end
