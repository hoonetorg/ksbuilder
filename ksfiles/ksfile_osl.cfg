{
  "hostname": {
    "transient": "osl",
    "static": ""
  },
  "user": {
    "fullName": "{{username}}",
    "password": "{{userpw}}",
    "hashedPassword": true,
    "userName": "{{username}}"
  },
  "software": {
    "patterns": [
      "kvm_tools",
      "gnome",
      "selinux"
    ],
    "packages": []
  },
  "product": {
    "id": "{{version}}"
  },
  "storage": {
    "boot": {
      "configure": true
    },
    "drives": [
      {
        "search": {
          "condition": {
            "name": "{{diskpath}}"
          },
          "ifNotFound": "error"
        },
        "partitions": [
          {
            "encryption": {
              "luks2": {
                "password": "hoonetorg"
              }
            },
            "filesystem": {
              "reuseIfPossible": false,
              "path": "/",
              "mountOptions": [],
              "mkfsOptions": [],
              "type": {
                "btrfs": {
                  "snapshots": true
                }
              }
            }
          },
          {
            "encryption": {
              "luks2": {
                "password": "hoonetorg"
              }
            },
            "filesystem": {
              "reuseIfPossible": false,
              "path": "swap",
              "mountOptions": [],
              "mkfsOptions": [],
              "type": "swap"
            }
          },
          {
            "search": {
              "ifNotFound": "skip"
            },
            "delete": true
          }
        ]
      }
    ],
    "volumeGroups": [],
    "mdRaids": []
  },
  "localization": {
    "language": "en_US.UTF-8",
    "keyboard": "us",
    "timezone": "Europe/Vienna"
  }
}
